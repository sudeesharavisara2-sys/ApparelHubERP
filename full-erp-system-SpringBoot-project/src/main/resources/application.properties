spring.application.name=full-erp-system-project

# ================================
# POSTGRESQL DATASOURCE
# ================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ABC}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:24142}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================================
# FLYWAY
# ================================
spring.flyway.enabled=false

# ================================
# JWT
# ================================
app.jwt.secret=${JWT_SECRET:saiofal;vkasfbehwqpofhjashofjaswfpojasfvbafop[hfifonfo[shjfwefjjfslajfsahfoshffasnbash[f}}

app.jwt.expiration-ms=86400000

# ================================
# SERVER
# ================================
server.port=8081

# ================================
# CORS
# ================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ================================
# LOGGING
# ================================
logging.level.com.zaxxer.hikari=WARN
logging.level.org.flywaydb=INFO
logging.level.com.ERP=DEBUG